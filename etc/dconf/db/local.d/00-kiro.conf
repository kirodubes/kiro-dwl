# Kiro dwl — system-wide GTK appearance defaults (delivered via dconf).
# dwl itself is config.h/compile-time, but GTK apps run under it still read
# gsettings; this sets the base GTK theme/icon/cursor so the desktop isn't
# Adwaita/blank out of the box.
[org/gnome/desktop/interface]
color-scheme='prefer-dark'
gtk-theme='adw-gtk3-dark'
icon-theme='Surfn'
cursor-theme='Bibata-Modern-Ice'
cursor-size=24
